
name: myapp
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_blockly: ^1.6.0
  flutter_cube: ^0.1.1
  file_picker: ^11.0.2
  three_js: ^0.2.7
  web: ^1.1.1
  google_fonts: ^8.1.0
  collection: ^1.18.0
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.1
  cloud_firestore: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
  fonts:
    - family: DotGothic16
      fonts:
        - asset: assets/models/DotGothic16-Regular.ttf
