<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>8x8 Block Blast - Ranking & Scroll</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --grid-bg: #1e293b;
            --cell-empty: #334155;
        }
        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            /* ページ全体のスクロールを防止してゲームに集中 */
            overflow: hidden; 
            touch-action: none;
            height: 100vh;
        }
        
        .game-container {
            width: 100%;
            max-width: 450px;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 1rem;
            box-sizing: border-box;
        }

        #grid-container {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: var(--grid-bg);
            border-radius: 12px;
            padding: 8px;
            box-sizing: border-box;
            border: 4px solid #334155;
            position: relative;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            gap: 4px;
            width: 100%;
            height: 100%;
        }

        .grid-cell {
            background-color: var(--cell-empty);
            border-radius: 4px;
        }

        .grid-cell.highlight {
            background-color: rgba(255, 255, 255, 0.4) !important;
        }

        .hand-area {
            margin-top: 1rem;
            display: flex;
            justify-content: space-between;
            gap: 0.5rem;
            height: 90px;
        }

        .piece-slot {
            flex: 1;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
        }

        .piece-visual {
            cursor: grab;
            touch-action: none;
        }

        .dragging {
            position: fixed;
            pointer-events: none;
            z-index: 1000;
            opacity: 0.9;
            /* 指で隠れないように垂直オフセット */
            margin-top: -70px; 
        }

        /* Colors */
        .color-1 { background-color: #ff006e; box-shadow: inset -2px -2px 4px rgba(0,0,0,0.3); }
        .color-2 { background-color: #8338ec; box-shadow: inset -2px -2px 4px rgba(0,0,0,0.3); }
        .color-3 { background-color: #3a86ff; box-shadow: inset -2px -2px 4px rgba(0,0,0,0.3); }
        .color-4 { background-color: #fb5607; box-shadow: inset -2px -2px 4px rgba(0,0,0,0.3); }
        .color-5 { background-color: #ffbe0b; box-shadow: inset -2px -2px 4px rgba(0,0,0,0.3); }
        
        /* Scrollable Ranking */
        .ranking-box {
            margin-top: 1rem;
            flex: 1;
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            min-height: 0; /* flex内のスクロールに必須 */
        }

        .ranking-list {
            overflow-y: auto;
            flex: 1;
            padding-right: 4px;
        }

        .ranking-list::-webkit-scrollbar {
            width: 4px;
        }
        .ranking-list::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <!-- Score Header -->
        <div class="flex justify-between items-end mb-4">
            <div>
                <h1 class="text-xl font-black text-blue-400 leading-none">BLOCK BLAST</h1>
                <p class="text-[10px] text-slate-500 font-bold">WORLD RANKING SYSTEM</p>
            </div>
            <div class="flex gap-4">
                <div class="text-right">
                    <p class="text-[9px] text-slate-400 font-bold uppercase">Best</p>
                    <p id="high-score" class="text-lg font-mono font-black text-yellow-400 leading-none">0</p>
                </div>
                <div class="text-right">
                    <p class="text-[9px] text-slate-400 font-bold uppercase">Score</p>
                    <p id="score" class="text-lg font-mono font-black leading-none">0</p>
                </div>
            </div>
        </div>

        <!-- Grid Board -->
        <div id="grid-container">
            <div id="grid"></div>
        </div>

        <!-- Pieces in Hand -->
        <div id="hand" class="hand-area"></div>

        <!-- Scrollable Ranking -->
        <div class="ranking-box">
            <div class="flex justify-between items-center mb-2">
                <h2 class="text-xs font-black text-slate-400 uppercase tracking-widest">Global Ranking</h2>
                <span id="loading-status" class="text-[10px] text-blue-400 animate-pulse">Syncing...</span>
            </div>
            <div id="leaderboard" class="ranking-list space-y-2">
                <!-- Ranked items will appear here -->
            </div>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over" class="hidden fixed inset-0 bg-slate-950/95 flex flex-col items-center justify-center z-[2000] p-6">
        <h2 class="text-3xl font-black text-white mb-2 italic">GAME OVER</h2>
        <p id="final-score" class="text-7xl font-black text-blue-500 mb-2">0</p>
        <div id="new-record" class="hidden text-yellow-400 font-bold animate-bounce mb-6 text-xl">NEW WORLD RECORD!</div>
        
        <button onclick="resetGame()" class="w-full max-w-xs py-4 bg-blue-600 hover:bg-blue-500 text-white rounded-2xl font-black text-xl mb-4 transition-all shadow-lg active:scale-95">
            PLAY AGAIN
        </button>
        <div class="text-slate-500 text-[10px] font-mono opacity-50">UID: <span id="user-id-display"></span></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, onSnapshot, limit } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDhqvXCs1h7lwlZlPpzd0O8Xfjie7kfoAg",
            authDomain: "evacuation-map-data.firebaseapp.com",
            projectId: "evacuation-map-data",
            storageBucket: "evacuation-map-data.firebasestorage.app",
            messagingSenderId: "1055923693779",
            appId: "1:1055923693779:web:591d839d20611a82ad8c26",
            measurementId: "G-JBW84Y5HNC"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'block-blast-pro';

        let user = null;
        let personalBest = 0;
        const GRID_SIZE = 8;
        let grid = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(0));
        let score = 0;
        let currentHand = [null, null, null];
        let draggingElement = null;
        let dragInfo = { index: null, offset: { x: 0, y: 0 }, piece: null };

        const PIECE_DEFS = [
            { shape: [[0,0]], color: 1 },
            { shape: [[0,0],[0,1]], color: 2 },
            { shape: [[0,0],[1,0]], color: 2 },
            { shape: [[0,0],[0,1],[0,2]], color: 3 },
            { shape: [[0,0],[1,0],[2,0]], color: 3 },
            { shape: [[0,0],[0,1],[1,0],[1,1]], color: 4 },
            { shape: [[0,0],[1,0],[1,1]], color: 5 },
            { shape: [[0,0],[0,1],[1,0]], color: 5 },
            { shape: [[0,0],[0,1],[1,1],[1,2]], color: 1 },
            { shape: [[0,1],[1,0],[1,1],[1,2]], color: 3 },
            { shape: [[0,0],[1,0],[2,0],[3,0]], color: 4 },
        ];

        async function initAuth() {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        }

        onAuthStateChanged(auth, (u) => {
            user = u;
            if (user) {
                document.getElementById('user-id-display').innerText = user.uid.substring(0, 10);
                loadLeaderboard();
                loadPersonalBest();
            }
        });

        function initGrid() {
            const gridEl = document.getElementById('grid');
            gridEl.innerHTML = '';
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'grid-cell';
                    cell.id = `cell-${r}-${c}`;
                    gridEl.appendChild(cell);
                }
            }
            generateHand();
            renderGrid();
        }

        function renderGrid() {
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    const cell = document.getElementById(`cell-${r}-${c}`);
                    cell.className = 'grid-cell' + (grid[r][c] ? ` color-${grid[r][c]}` : '');
                }
            }
        }

        function generateHand() {
            currentHand = [0, 1, 2].map(() => ({
                ...PIECE_DEFS[Math.floor(Math.random() * PIECE_DEFS.length)],
                used: false
            }));
            renderHand();
        }

        function renderHand() {
            const handEl = document.getElementById('hand');
            handEl.innerHTML = '';
            currentHand.forEach((piece, idx) => {
                const slot = document.createElement('div');
                slot.className = 'piece-slot';
                if (piece && !piece.used) {
                    const visual = createPieceVisual(piece, getCellSize() * 0.65);
                    visual.addEventListener('pointerdown', (e) => startDrag(e, idx, piece));
                    slot.appendChild(visual);
                }
                handEl.appendChild(slot);
            });
        }

        function getCellSize() {
            const gridEl = document.getElementById('grid');
            return (gridEl.clientWidth - (GRID_SIZE - 1) * 4) / GRID_SIZE;
        }

        function createPieceVisual(piece, size) {
            const container = document.createElement('div');
            container.className = 'piece-visual relative';
            const gap = 4;
            const maxR = Math.max(...piece.shape.map(p => p[0])) + 1;
            const maxC = Math.max(...piece.shape.map(p => p[1])) + 1;
            container.style.width = `${maxC * size + (maxC-1) * gap}px`;
            container.style.height = `${maxR * size + (maxR-1) * gap}px`;
            piece.shape.forEach(([r, c]) => {
                const block = document.createElement('div');
                block.className = `absolute color-${piece.color} rounded-[3px]`;
                block.style.width = `${size}px`;
                block.style.height = `${size}px`;
                block.style.top = `${r * (size + gap)}px`;
                block.style.left = `${c * (size + gap)}px`;
                container.appendChild(block);
            });
            return container;
        }

        function startDrag(e, index, piece) {
            const rect = e.currentTarget.getBoundingClientRect();
            dragInfo = { 
                index, 
                piece, 
                offset: { x: e.clientX - rect.left, y: e.clientY - rect.top } 
            };
            
            draggingElement = createPieceVisual(piece, getCellSize());
            draggingElement.classList.add('dragging');
            updateDragPosition(e.clientX, e.clientY);
            document.body.appendChild(draggingElement);
            e.currentTarget.style.opacity = '0';
            
            window.addEventListener('pointermove', onMove);
            window.addEventListener('pointerup', onEnd);
        }

        function onMove(e) {
            updateDragPosition(e.clientX, e.clientY);
            highlightGrid(e.clientX, e.clientY);
        }

        function updateDragPosition(x, y) {
            if (!draggingElement) return;
            draggingElement.style.left = `${x - dragInfo.offset.x}px`;
            draggingElement.style.top = `${y - dragInfo.offset.y}px`;
        }

        function highlightGrid(x, y) {
            document.querySelectorAll('.grid-cell').forEach(c => c.classList.remove('highlight'));
            const checkY = y - 70; // 浮き上がりオフセット分
            const coords = getGridAt(x, checkY);
            if (coords && canPlace(dragInfo.piece, coords.r, coords.c)) {
                dragInfo.piece.shape.forEach(([dr, dc]) => {
                    const cell = document.getElementById(`cell-${coords.r + dr}-${coords.c + dc}`);
                    if (cell) cell.classList.add('highlight');
                });
            }
        }

        function getGridAt(x, y) {
            const rect = document.getElementById('grid').getBoundingClientRect();
            if (x < rect.left || x > rect.right || y < rect.top || y > rect.bottom) return null;
            const sizeWithGap = rect.width / GRID_SIZE;
            const r = Math.floor((y - rect.top) / sizeWithGap);
            const c = Math.floor((x - rect.left) / sizeWithGap);
            return (r >= 0 && r < GRID_SIZE && c >= 0 && c < GRID_SIZE) ? { r, c } : null;
        }

        function onEnd(e) {
            const checkY = e.clientY - 70;
            const coords = getGridAt(e.clientX, checkY);
            if (coords && canPlace(dragInfo.piece, coords.r, coords.c)) {
                placePiece(dragInfo.piece, coords.r, coords.c);
                currentHand[dragInfo.index].used = true;
                checkLines();
                if (currentHand.every(p => p.used)) generateHand();
                checkGameOver();
            }
            if (draggingElement) draggingElement.remove();
            draggingElement = null;
            window.removeEventListener('pointermove', onMove);
            window.removeEventListener('pointerup', onEnd);
            document.querySelectorAll('.grid-cell').forEach(c => c.classList.remove('highlight'));
            renderHand();
            renderGrid();
        }

        function canPlace(piece, r, c) {
            return piece.shape.every(([dr, dc]) => {
                const nr = r + dr, nc = c + dc;
                return nr >= 0 && nr < GRID_SIZE && nc >= 0 && nc < GRID_SIZE && grid[nr][nc] === 0;
            });
        }

        function placePiece(piece, r, c) {
            piece.shape.forEach(([dr, dc]) => grid[r + dr][c + dc] = piece.color);
            score += piece.shape.length;
            document.getElementById('score').innerText = score;
        }

        function checkLines() {
            let fullR = [], fullC = [];
            for (let i = 0; i < GRID_SIZE; i++) {
                if (grid[i].every(v => v !== 0)) fullR.push(i);
                let colFull = true;
                for (let j = 0; j < GRID_SIZE; j++) if (grid[j][i] === 0) { colFull = false; break; }
                if (colFull) fullC.push(i);
            }
            fullR.forEach(r => grid[r].fill(0));
            fullC.forEach(c => { for (let r = 0; r < GRID_SIZE; r++) grid[r][c] = 0; });
            if (fullR.length || fullC.length) {
                score += (fullR.length + fullC.length) * 100;
                document.getElementById('score').innerText = score;
            }
        }

        async function checkGameOver() {
            const playable = currentHand.filter(p => p && !p.used);
            if (playable.length === 0) return;
            let possible = false;
            for (let p of playable) {
                for (let r = 0; r < GRID_SIZE; r++) {
                    for (let c = 0; c < GRID_SIZE; c++) {
                        if (canPlace(p, r, c)) { possible = true; break; }
                    }
                    if (possible) break;
                }
                if (possible) break;
            }
            if (!possible) {
                document.getElementById('final-score').innerText = score;
                document.getElementById('game-over').classList.remove('hidden');
                if (score > personalBest) {
                    personalBest = score;
                    document.getElementById('high-score').innerText = personalBest;
                    document.getElementById('new-record').classList.remove('hidden');
                    await saveScore(score);
                }
            }
        }

        async function saveScore(s) {
            if (!user) return;
            try {
                const scoreRef = doc(db, 'artifacts', appId, 'public', 'data', 'scores', user.uid);
                await setDoc(scoreRef, { userId: user.uid, score: s, timestamp: Date.now() });
            } catch (e) { console.error(e); }
        }

        async function loadPersonalBest() {
            if (!user) return;
            const scoreRef = doc(db, 'artifacts', appId, 'public', 'data', 'scores', user.uid);
            const snap = await getDoc(scoreRef);
            if (snap.exists()) {
                personalBest = snap.data().score || 0;
                document.getElementById('high-score').innerText = personalBest;
            }
        }

        function loadLeaderboard() {
            if (!user) return;
            const scoresRef = collection(db, 'artifacts', appId, 'public', 'data', 'scores');
            onSnapshot(query(scoresRef, limit(50)), (snap) => {
                const scores = [];
                snap.forEach(d => scores.push(d.data()));
                scores.sort((a, b) => b.score - a.score);
                
                document.getElementById('loading-status').innerText = "Live";
                document.getElementById('leaderboard').innerHTML = scores.map((s, i) => `
                    <div class="flex justify-between items-center p-2 rounded-lg ${s.userId === user?.uid ? 'bg-blue-600/20 border border-blue-500/30' : 'bg-slate-800/40'}">
                        <div class="flex items-center gap-3">
                            <span class="text-[10px] font-black w-5 ${i < 3 ? 'text-yellow-400' : 'text-slate-500'}">${i + 1}</span>
                            <div class="flex flex-col">
                                <span class="text-[10px] font-mono text-slate-300 truncate w-24">${s.userId}</span>
                                <span class="text-[8px] text-slate-500 uppercase">${new Date(s.timestamp).toLocaleDateString()}</span>
                            </div>
                        </div>
                        <span class="text-xs font-black text-white">${s.score.toLocaleString()}</span>
                    </div>
                `).join('');
            }, (err) => {
                document.getElementById('loading-status').innerText = "Offline";
            });
        }

        window.resetGame = () => {
            grid = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(0));
            score = 0;
            document.getElementById('score').innerText = score;
            document.getElementById('game-over').classList.add('hidden');
            document.getElementById('new-record').classList.add('hidden');
            initGrid();
        };

        initAuth();
        initGrid();
    </script>
</body>
</html>
