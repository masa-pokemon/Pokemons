<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Puyo Ultimate - Battle Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; touch-action: manipulation; overflow: hidden; }
        canvas {
            image-rendering: pixelated;
            background-color: #020617;
            border: 4px solid #334155;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 220px;
        }
        .game-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-weight: 900;
            font-style: italic;
            z-index: 20;
        }
        .garbage-indicator {
            height: 24px;
            font-weight: bold;
            color: #cbd5e1;
            text-shadow: 0 0 5px rgba(255,255,255,0.5);
        }
    </style>
</head>
<body class="text-slate-100 font-sans flex flex-col items-center p-4">

    <!-- Header -->
    <div id="header" class="text-center mt-2 mb-4">
        <h1 class="text-3xl font-black italic bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">
            PUYO ULTIMATE
        </h1>
        <p id="status-text" class="text-slate-400 text-sm">モードを選択してください</p>
    </div>

    <!-- Menu Screen -->
    <div id="menu-screen" class="grid grid-cols-1 gap-4 w-full max-w-xs mt-10">
        <button onclick="startGame('solo')" class="p-6 bg-blue-600 rounded-2xl shadow-lg hover:scale-105 transition flex flex-col items-center">
            <span class="text-2xl font-bold">1人で練習</span>
        </button>
        <button onclick="startGame('com')" class="p-6 bg-purple-600 rounded-2xl shadow-lg hover:scale-105 transition flex flex-col items-center">
            <span class="text-2xl font-bold">COMと対戦</span>
        </button>
        <button onclick="startGame('online')" class="p-6 bg-emerald-600 rounded-2xl shadow-lg hover:scale-105 transition flex flex-col items-center">
            <span class="text-2xl font-bold">オンライン対戦</span>
        </button>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="hidden w-full max-w-4xl">
        <div class="flex flex-wrap justify-center gap-4">
            <!-- My Board -->
            <div class="flex flex-col items-center">
                <div id="my-garbage" class="garbage-indicator"></div>
                <div class="mb-1 flex items-center justify-between w-full px-2 text-sm">
                    <span class="font-bold text-blue-400">YOU</span>
                    <span id="my-score" class="font-mono">0</span>
                </div>
                <div class="relative">
                    <canvas id="myCanvas"></canvas>
                    <div id="my-gameover" class="game-overlay hidden text-red-500 text-3xl">GAME OVER</div>
                </div>
            </div>

            <!-- Opponent Board -->
            <div id="opponent-area" class="flex flex-col items-center opacity-80">
                <div id="op-garbage" class="garbage-indicator"></div>
                <div class="mb-1 flex items-center justify-between w-full px-2 text-sm">
                    <span id="op-label" class="font-bold text-red-400">OPPONENT</span>
                    <span id="op-score" class="font-mono">0</span>
                </div>
                <div class="relative">
                    <canvas id="opCanvas"></canvas>
                    <div id="op-gameover" class="game-overlay hidden text-emerald-500 text-3xl">WIN</div>
                </div>
            </div>
        </div>

        <!-- Controls (Mobile) -->
        <div class="grid grid-cols-3 gap-3 mt-6 max-w-xs mx-auto md:hidden">
            <button onpointerdown="triggerInput('left')" class="bg-slate-800 p-4 rounded-xl active:bg-slate-700">←</button>
            <button onpointerdown="triggerInput('down')" class="bg-slate-800 p-4 rounded-xl active:bg-slate-700">↓</button>
            <button onpointerdown="triggerInput('right')" class="bg-slate-800 p-4 rounded-xl active:bg-slate-700">→</button>
            <div />
            <button onpointerdown="triggerInput('rotate')" class="bg-blue-600 p-4 rounded-xl font-bold active:bg-blue-500">回転</button>
            <div />
        </div>

        <div class="mt-6 flex justify-center">
            <button onclick="backToMenu()" class="px-6 py-2 bg-slate-800 hover:bg-slate-700 rounded-full text-xs font-bold transition">
                タイトルに戻る
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Constants ---
        const COLS = 6;
        const ROWS = 12;
        const BLOCK_SIZE = 26;
        const COLORS = [null, '#ff4d4d', '#4d79ff', '#4dff4d', '#ffff4d', '#ff4dff', '#cbd5e1']; 
        const GARBAGE_COLOR_IDX = 6;

        // --- Variables ---
        let currentMode = 'menu';
        let playerNum = null;
        let db, auth, appId, user;
        let gameActive = false;
        let gameLoopTimer = null;
        let comLoopTimer = null;

        let myState = createInitialState();
        let opState = createInitialState();

        const myCanvas = document.getElementById('myCanvas');
        const opCanvas = document.getElementById('opCanvas');
        const myCtx = myCanvas.getContext('2d');
        const opCtx = opCanvas.getContext('2d');

        [myCanvas, opCanvas].forEach(c => {
            c.width = COLS * BLOCK_SIZE;
            c.height = ROWS * BLOCK_SIZE;
        });

        function createInitialState() {
            return {
                grid: Array.from({ length: ROWS }, () => Array(COLS).fill(0)),
                currentPuyo: null,
                score: 0,
                garbagePending: 0, 
                gameOver: false,
                lastAttack: 0
            };
        }

        // --- Firebase Configuration ---
        const initFirebase = async () => {
            // For Firebase JS SDK v7.20.0 and later, measurementId is optional
            const firebaseConfig = {
                apiKey: "AIzaSyDhqvXCs1h7lwlZlPpzd0O8Xfjie7kfoAg",
                authDomain: "evacuation-map-data.firebaseapp.com",
                projectId: "evacuation-map-data",
                storageBucket: "evacuation-map-data.firebasestorage.app",
                messagingSenderId: "1055923693779",
                appId: "1:1055923693779:web:591d839d20611a82ad8c26",
                measurementId: "G-JBW84Y5HNC"
            };

            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
            appId = typeof __app_id !== 'undefined' ? __app_id : 'puyo-ultimate-custom';

            const initAuth = async () => {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            };
            await initAuth();
            onAuthStateChanged(auth, (u) => { 
                user = u; 
                if (user) document.getElementById('status-text').innerText = "オンライン準備完了";
            });
        };

        function createPuyo() {
            return {
                x: 2, y: 0,
                color1: Math.floor(Math.random() * 5) + 1,
                color2: Math.floor(Math.random() * 5) + 1,
                rotation: 0 
            };
        }

        function getPuyoPositions(puyo) {
            const pos1 = { x: puyo.x, y: puyo.y };
            const pos2 = { x: puyo.x, y: puyo.y };
            if (puyo.rotation === 0) pos2.y--;
            else if (puyo.rotation === 1) pos2.x++;
            else if (puyo.rotation === 2) pos2.y++;
            else if (puyo.rotation === 3) pos2.x--;
            return [pos1, pos2];
        }

        function isValid(puyo, grid) {
            return getPuyoPositions(puyo).every(pos => {
                return pos.x >= 0 && pos.x < COLS && pos.y < ROWS && (pos.y < 0 || grid[pos.y][pos.x] === 0);
            });
        }

        function applyGravity(grid) {
            let moved = false;
            for (let x = 0; x < COLS; x++) {
                let emptyRow = ROWS - 1;
                for (let y = ROWS - 1; y >= 0; y--) {
                    if (grid[y][x] !== 0) {
                        if (emptyRow !== y) {
                            grid[emptyRow][x] = grid[y][x];
                            grid[y][x] = 0;
                            moved = true;
                        }
                        emptyRow--;
                    }
                }
            }
            return moved;
        }

        function checkAndErase(grid) {
            const visited = Array.from({ length: ROWS }, () => Array(COLS).fill(false));
            const toErase = [];

            for (let y = 0; y < ROWS; y++) {
                for (let x = 0; x < COLS; x++) {
                    if (grid[y][x] !== 0 && grid[y][x] !== GARBAGE_COLOR_IDX && !visited[y][x]) {
                        const color = grid[y][x];
                        const group = [];
                        const queue = [{x, y}];
                        visited[y][x] = true;

                        while (queue.length > 0) {
                            const p = queue.shift();
                            group.push(p);
                            [[0,1],[0,-1],[1,0],[-1,0]].forEach(([dx, dy]) => {
                                const nx = p.x + dx, ny = p.y + dy;
                                if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && !visited[ny][nx] && grid[ny][nx] === color) {
                                    visited[ny][nx] = true;
                                    queue.push({x: nx, y: ny});
                                }
                            });
                        }
                        if (group.length >= 4) toErase.push(...group);
                    }
                }
            }

            if (toErase.length > 0) {
                const garbageToErase = [];
                toErase.forEach(p => {
                    [[0,1],[0,-1],[1,0],[-1,0]].forEach(([dx, dy]) => {
                        const nx = p.x + dx, ny = p.y + dy;
                        if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && grid[ny][nx] === GARBAGE_COLOR_IDX) {
                            garbageToErase.push({x: nx, y: ny});
                        }
                    });
                });
                toErase.forEach(p => grid[p.y][p.x] = 0);
                garbageToErase.forEach(p => grid[p.y][p.x] = 0);
                return toErase.length;
            }
            return 0;
        }

        function draw(ctx, state) {
            ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
            for (let y = 0; y < ROWS; y++) {
                for (let x = 0; x < COLS; x++) {
                    if (state.grid[y][x]) drawBlock(ctx, x, y, COLORS[state.grid[y][x]]);
                }
            }
            if (state.currentPuyo && !state.gameOver) {
                const pos = getPuyoPositions(state.currentPuyo);
                drawBlock(ctx, pos[0].x, pos[0].y, COLORS[state.currentPuyo.color1]);
                drawBlock(ctx, pos[1].x, pos[1].y, COLORS[state.currentPuyo.color2]);
            }
        }

        function drawBlock(ctx, x, y, color) {
            if (y < 0) return;
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.roundRect(x * BLOCK_SIZE + 1, y * BLOCK_SIZE + 1, BLOCK_SIZE - 2, BLOCK_SIZE - 2, 6);
            ctx.fill();
        }

        function dropGarbage(state, amount) {
            const rowsToDrop = Math.ceil(amount / COLS);
            let dropped = 0;
            for (let r = 0; r < rowsToDrop; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (dropped < amount) {
                        if (state.grid[0][c] === 0) {
                            state.grid[0][c] = GARBAGE_COLOR_IDX;
                            dropped++;
                        } else {
                            state.gameOver = true;
                        }
                    }
                }
                applyGravity(state.grid);
            }
        }

        function loop() {
            if (myState.gameOver || !gameActive) return;

            const nextPuyo = { ...myState.currentPuyo, y: myState.currentPuyo.y + 1 };
            if (isValid(nextPuyo, myState.grid)) {
                myState.currentPuyo = nextPuyo;
            } else {
                const pos = getPuyoPositions(myState.currentPuyo);
                pos.forEach((p, i) => {
                    if (p.y >= 0) myState.grid[p.y][p.x] = (i === 0 ? myState.currentPuyo.color1 : myState.currentPuyo.color2);
                    else myState.gameOver = true;
                });

                let totalErased = 0;
                let erased;
                do {
                    applyGravity(myState.grid);
                    erased = checkAndErase(myState.grid);
                    totalErased += erased;
                } while (erased > 0);

                if (totalErased > 0) {
                    myState.score += totalErased * 10;
                    let attack = Math.floor(totalErased / 2);
                    if (myState.garbagePending > 0) {
                        const offset = Math.min(myState.garbagePending, attack);
                        myState.garbagePending -= offset;
                        attack -= offset;
                    }
                    if (attack > 0) {
                        if (currentMode === 'com') opState.garbagePending += attack;
                        else if (currentMode === 'online') myState.lastAttack = attack;
                    }
                } else {
                    if (myState.garbagePending > 0) {
                        dropGarbage(myState, Math.min(myState.garbagePending, 30));
                        myState.garbagePending = Math.max(0, myState.garbagePending - 30);
                    }
                }

                myState.currentPuyo = createPuyo();
                if (myState.grid[0][2] !== 0) myState.gameOver = true;
            }

            if (myState.gameOver) {
                document.getElementById('my-gameover').classList.remove('hidden');
                gameActive = false;
            }

            updateUI();
            if (currentMode === 'online') syncOnline();
            gameLoopTimer = setTimeout(loop, 800);
        }

        function runCOMLogic() {
            if (opState.gameOver || !gameActive || currentMode !== 'com') return;

            const tx = Math.floor(Math.random() * COLS);
            const puyo = createPuyo();
            puyo.x = tx;
            
            while (isValid({ ...puyo, y: puyo.y + 1 }, opState.grid)) puyo.y++;
            
            const pos = getPuyoPositions(puyo);
            pos.forEach((p, i) => {
                if (p.y >= 0) opState.grid[p.y][p.x] = (i === 0 ? puyo.color1 : puyo.color2);
                else opState.gameOver = true;
            });

            let totalErased = 0;
            let erased;
            do {
                applyGravity(opState.grid);
                erased = checkAndErase(opState.grid);
                totalErased += erased;
            } while (erased > 0);

            if (totalErased > 0) {
                opState.score += totalErased * 10;
                let attack = Math.floor(totalErased / 2);
                if (opState.garbagePending > 0) {
                    const offset = Math.min(opState.garbagePending, attack);
                    opState.garbagePending -= offset;
                    attack -= offset;
                }
                if (attack > 0) myState.garbagePending += attack;
            } else {
                if (opState.garbagePending > 0) {
                    dropGarbage(opState, Math.min(opState.garbagePending, 30));
                    opState.garbagePending = Math.max(0, opState.garbagePending - 30);
                }
            }

            if (opState.grid[0][2] !== 0) {
                opState.gameOver = true;
                document.getElementById('op-gameover').innerText = "WIN";
                document.getElementById('op-gameover').classList.remove('hidden');
            }

            updateUI();
            comLoopTimer = setTimeout(runCOMLogic, 1500);
        }

        async function syncOnline() {
            if (!playerNum || !user) return;
            const ref = doc(db, 'artifacts', appId, 'public', 'data', 'battle1');
            const data = {};
            data[`p${playerNum}`] = JSON.stringify(myState);
            if (myState.lastAttack > 0) {
                // Reset internal attack state after sending
                myState.lastAttack = 0;
            }
            await updateDoc(ref, data).catch(() => {});
        }

        function updateUI() {
            draw(myCtx, myState);
            draw(opCtx, opState);
            document.getElementById('my-score').innerText = myState.score;
            document.getElementById('op-score').innerText = opState.score;
            const myG = document.getElementById('my-garbage');
            const opG = document.getElementById('op-garbage');
            myG.innerText = myState.garbagePending > 0 ? "⚠️ ".repeat(Math.min(5, Math.ceil(myState.garbagePending/6))) + ` (${myState.garbagePending})` : "";
            opG.innerText = opState.garbagePending > 0 ? "⚠️ ".repeat(Math.min(5, Math.ceil(opState.garbagePending/6))) + ` (${opState.garbagePending})` : "";
        }

        window.triggerInput = (type) => {
            if (myState.gameOver || !gameActive) return;
            const p = { ...myState.currentPuyo };
            if (type === 'left') p.x--;
            if (type === 'right') p.x++;
            if (type === 'down') p.y++;
            if (type === 'rotate') p.rotation = (p.rotation + 1) % 4;
            if (isValid(p, myState.grid)) {
                myState.currentPuyo = p;
                updateUI();
                if (currentMode === 'online') syncOnline();
            }
        };

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') triggerInput('left');
            if (e.key === 'ArrowRight') triggerInput('right');
            if (e.key === 'ArrowDown') triggerInput('down');
            if (e.key === 'ArrowUp' || e.key === 'z') triggerInput('rotate');
        });

        window.startGame = async (mode) => {
            if (!user) {
                document.getElementById('status-text').innerText = "接続中...";
                return;
            }
            currentMode = mode;
            myState = createInitialState();
            opState = createInitialState();
            myState.currentPuyo = createPuyo();
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('my-gameover').classList.add('hidden');
            document.getElementById('op-gameover').classList.add('hidden');

            gameActive = true;
            loop();

            if (mode === 'solo') {
                document.getElementById('opponent-area').classList.add('hidden');
            } else if (mode === 'com') {
                document.getElementById('opponent-area').classList.remove('hidden');
                document.getElementById('op-label').innerText = "COM";
                runCOMLogic();
            } else if (mode === 'online') {
                document.getElementById('opponent-area').classList.remove('hidden');
                document.getElementById('op-label').innerText = "OPPONENT";
                setupOnlineMatch();
            }
        };

        async function setupOnlineMatch() {
            if (!user) return;
            const ref = doc(db, 'artifacts', appId, 'public', 'data', 'battle1');
            onSnapshot(ref, (snap) => {
                const data = snap.data();
                if (!data) {
                    setDoc(ref, { p1_id: user.uid, p1: JSON.stringify(myState), p2: JSON.stringify(opState), status: 'waiting' });
                    playerNum = 1;
                } else {
                    if (data.p1_id === user.uid) playerNum = 1;
                    else if (data.p2_id === user.uid || !data.p2_id) {
                        playerNum = 2;
                        if (!data.p2_id) updateDoc(ref, { p2_id: user.uid, status: 'playing' });
                    }
                    const opNum = playerNum === 1 ? 2 : 1;
                    if (data[`p${opNum}`]) {
                        const parsedOp = JSON.parse(data[`p${opNum}`]);
                        if (parsedOp.lastAttack > 0) {
                            myState.garbagePending += parsedOp.lastAttack;
                        }
                        opState = parsedOp;
                        updateUI();
                        if (opState.gameOver) {
                            document.getElementById('op-gameover').innerText = "WIN";
                            document.getElementById('op-gameover').classList.remove('hidden');
                        }
                    }
                }
            }, (error) => console.error(error));
        }

        window.backToMenu = () => {
            gameActive = false;
            clearTimeout(gameLoopTimer);
            clearTimeout(comLoopTimer);
            document.getElementById('menu-screen').classList.remove('hidden');
            document.getElementById('game-screen').classList.add('hidden');
        };

        initFirebase();
    </script>
</body>
</html>
